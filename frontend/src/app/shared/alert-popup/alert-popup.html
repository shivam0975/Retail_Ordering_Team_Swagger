@if (alertState.alert().visible) {
  <div class="position-fixed top-0 end-0 p-3" style="z-index: 1080; width: 360px; max-width: 100%;">
    <div class="alert d-flex justify-content-between align-items-start"
         [class.alert-success]="alertState.alert().type === 'success'"
         [class.alert-danger]="alertState.alert().type === 'error'">
      <div>{{ alertState.alert().message }}</div>
      <button class="btn-close ms-3" type="button" aria-label="Close" (click)="close()"></button>
    </div>
  </div>
}
