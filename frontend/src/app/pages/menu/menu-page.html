<div class="container py-4">
  <div class="row g-3 mb-4">
    <div class="col-12 col-md-6">
      <input class="form-control" placeholder="Search menu by name" [(ngModel)]="search" />
    </div>
    <div class="col-12 col-md-4">
      <select class="form-select" [(ngModel)]="selectedCategoryId">
        <option [ngValue]="0">All categories</option>
        @for (category of categories(); track category.id) {
          <option [ngValue]="category.id">{{ category.name }}</option>
        }
      </select>
    </div>
    <div class="col-12 col-md-2 d-grid">
      <button class="btn btn-primary" (click)="loadProducts()">Filter</button>
    </div>
  </div>

  @if (loading()) {
    <div class="text-center py-5">Loading products...</div>
  } @else {
    <div class="row g-3">
      @for (product of products(); track product.id) {
        <div class="col-12 col-sm-6 col-lg-4">
          <div class="card h-100 border-0 shadow-sm">
            <img [src]="product.imageUrl || 'https://via.placeholder.com/480x300?text=Product'"
                 [alt]="product.name"
                 class="card-img-top"
                 style="height: 180px; object-fit: cover;" />
            <div class="card-body d-flex flex-column">
              <h5 class="card-title mb-1">{{ product.name }}</h5>
              <p class="small text-secondary mb-2">
                {{ product.categoryName || 'Uncategorized' }} | {{ product.brandName || 'Generic' }}
              </p>
              <p class="mb-2">Stock: {{ product.stock }}</p>
              <div class="mt-auto d-flex justify-content-between align-items-center">
                <strong>{{ product.price | currency:'USD' }}</strong>
                <button class="btn btn-outline-primary btn-sm"
                        [disabled]="!product.isAvailable || product.stock <= 0"
                        (click)="addToCart(product)">
                  Add to cart
                </button>
              </div>
            </div>
          </div>
        </div>
      }
    </div>
  }
</div>
